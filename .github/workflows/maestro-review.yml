name: Maestro Reviewer

# Reusable: when called from a satellite shim via workflow_call, prompts
# are loaded from the pinned Maestro ref. When fired directly on this
# repo, prompts come from the working tree.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_call:
    inputs:
      maestro_ref:
        description: "Git ref of the Maestro repo to load prompts from. Required when a satellite calls this workflow; ignored when Maestro invokes itself."
        required: true
        type: string
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: "Claude Code OAuth token for the calling repo. Use `secrets: inherit` in the satellite shim."
        required: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  review:
    # On public repos, this prevents fork PRs from triggering a workflow that
    # consumes your subscription credits. (Note: GitHub already does not pass
    # secrets to workflows triggered by fork PRs, but this gate makes the
    # intent explicit and covers any future trigger expansion.)
    #
    # The `inputs.maestro_ref != ''` branch admits satellite callers; the
    # satellite shim is responsible for gating its own caller event before
    # invoking us. Without this branch, satellite shims that call from any
    # non-pull_request event silently no-op (in a reusable workflow,
    # `github.event` is the caller's event — if it's not a PR event,
    # `github.event.pull_request.author_association` is null).
    if: |
      inputs.maestro_ref != '' ||
      contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out Maestro prompts (when invoked from a satellite)
        if: ${{ inputs.maestro_ref != '' }}
        uses: actions/checkout@v4
        with:
          repository: manasgarg/maestro
          ref: ${{ inputs.maestro_ref }}
          path: .maestro-src

      - name: Resolve prompts source
        id: prompts
        run: |
          if [ -n "${{ inputs.maestro_ref }}" ]; then
            echo "dir=.maestro-src" >> "$GITHUB_OUTPUT"
          else
            echo "dir=." >> "$GITHUB_OUTPUT"
          fi

      - name: Compose Reviewer prompt
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO: ${{ github.repository }}
          PROMPTS_DIR: ${{ steps.prompts.outputs.dir }}
        run: |
          PROMPT_PATH="${RUNNER_TEMP}/maestro_prompt.md"
          {
            cat "$PROMPTS_DIR/prompts/reviewer.md"
            echo
            echo "---"
            echo
            echo "## PR to review"
            echo "- repo: \`$REPO\`"
            echo "- pull request: #$PR_NUMBER — $PR_TITLE"
            echo "- author: $PR_AUTHOR"
            echo
            echo "Read the PR description (it links the direction issue via \"Closes #N\"). Read the direction issue and its proposal to learn the acceptance criteria. Then audit the PR diff and evidence against those criteria, and post your review per the instructions above."
            if [ "$PROMPTS_DIR" != "." ]; then
              echo
              echo "## Path redirection (satellite mode — binding)"
              echo
              echo "This invocation is running against a **satellite repo**, not Maestro itself. The Maestro spec lives at \`$PROMPTS_DIR/\` — every relative path inside Maestro's own tree referenced by the prompt above resolves there, **not** in the current working directory. Specifically:"
              echo
              echo "- \`DESIGN.md\` → \`$PROMPTS_DIR/DESIGN.md\`"
              echo "- \`prompts/reviewer.md\` (this file) → \`$PROMPTS_DIR/prompts/reviewer.md\`"
              echo "- any other path under \`prompts/\`, \`tools/\`, or the Maestro repo root → \`$PROMPTS_DIR/<that-path>\`"
              echo
              echo "Your working directory is the **satellite repo** — that is what your review reads and comments on. The \`$PROMPTS_DIR/\` checkout is read-only context."
            fi
          } > "$PROMPT_PATH"
          echo "PROMPT_PATH=$PROMPT_PATH" >> "$GITHUB_ENV"

      - name: Run Reviewer
        uses: anthropics/claude-code-base-action@beta
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt_file: ${{ env.PROMPT_PATH }}
          claude_args: "--permission-mode bypassPermissions"
