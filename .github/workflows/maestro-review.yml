name: Maestro Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  review:
    # On public repos, this prevents fork PRs from triggering a workflow that
    # consumes your subscription credits. (Note: GitHub already does not pass
    # secrets to workflows triggered by fork PRs, but this gate makes the
    # intent explicit and covers any future trigger expansion.)
    if: |
      contains(fromJson('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compose Reviewer prompt
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO: ${{ github.repository }}
        run: |
          PROMPT_PATH="${RUNNER_TEMP}/maestro_prompt.md"
          {
            cat prompts/reviewer.md
            echo
            echo "---"
            echo
            echo "## PR to review"
            echo "- repo: \`$REPO\`"
            echo "- pull request: #$PR_NUMBER — $PR_TITLE"
            echo "- author: $PR_AUTHOR"
            echo
            echo "Read the PR description (it links the direction issue via \"Closes #N\"). Read the direction issue and its proposal to learn the acceptance criteria. Then audit the PR diff and evidence against those criteria, and post your review per the instructions above."
          } > "$PROMPT_PATH"
          echo "PROMPT_PATH=$PROMPT_PATH" >> "$GITHUB_ENV"

      - name: Run Reviewer
        uses: anthropics/claude-code-base-action@beta
        env:
          GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt_file: ${{ env.PROMPT_PATH }}
          claude_args: "--permission-mode bypassPermissions"
