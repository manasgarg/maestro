name: Maestro Implementer

# Satellite shim. Forwards Maestro Implementer events to the reusable
# workflow in manasgarg/maestro at the version pinned in this file's
# `uses:` line (kept in sync with .maestro/version by the bump PRs that
# Maestro opens on each new release).

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request:
    types: [closed]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  implement:
    uses: manasgarg/maestro/.github/workflows/maestro-implement.yml@__MAESTRO_VERSION__
    secrets: inherit
    with:
      maestro_ref: __MAESTRO_VERSION__
